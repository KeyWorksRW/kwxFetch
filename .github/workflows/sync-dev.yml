name: Weekly wxWidgets Sync

on:
  schedule:
    - cron: '0 8 * * 6'  # Saturday 8am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stable
            wx_branch: "3.2"
            release_tag: "wx-3.2-latest"
            always_build: false
            mode: full

          - name: dev
            wx_branch: "master"
            release_tag: "wx-dev-latest"
            always_build: true
            mode: full

          - name: interface
            wx_branch: "master"
            release_tag: "latest-interface"
            always_build: true
            mode: interface

    steps:
      - name: Get upstream version
        id: upstream
        run: |
          VERSION=$(curl -sS "https://raw.githubusercontent.com/wxWidgets/wxWidgets/${{ matrix.wx_branch }}/include/wx/version.h" \
            | grep -E '#define wx(MAJOR_VERSION|MINOR_VERSION|RELEASE_NUMBER) ' \
            | awk '{print $3}' | paste -sd '.')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Upstream ${{ matrix.name }}: $VERSION"

      - name: Check if rebuild needed
        id: check
        run: |
          CURRENT=$(gh release view "${{ matrix.release_tag }}" --json body -q '.body' 2>/dev/null \
            | grep -oP 'version=\K[\d.]+' || echo "none")
          echo "Published version: $CURRENT"

          if [[ "${{ matrix.always_build }}" == "false" && "$CURRENT" == "${{ steps.upstream.outputs.version }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.name }}: version $CURRENT unchanged"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Building ${{ matrix.name }}: $CURRENT -> ${{ steps.upstream.outputs.version }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout kwxFetch
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Clone wxWidgets (shallow + submodules)
        if: steps.check.outputs.skip != 'true' && matrix.mode == 'full'
        run: |
          git clone --depth 1 --recurse-submodules --shallow-submodules \
            -b ${{ matrix.wx_branch }} \
            https://github.com/wxWidgets/wxWidgets.git /tmp/wxWidgets

      - name: Clone wxWidgets (shallow, no submodules)
        if: steps.check.outputs.skip != 'true' && matrix.mode == 'interface'
        run: |
          git clone --depth 1 \
            -b ${{ matrix.wx_branch }} \
            https://github.com/wxWidgets/wxWidgets.git /tmp/wxWidgets

      - name: Run sync script
        if: steps.check.outputs.skip != 'true' && matrix.mode == 'full'
        run: python maintain/sync_wxwidgets.py --source /tmp/wxWidgets --dest .

      - name: Run sync script (interface only)
        if: steps.check.outputs.skip != 'true' && matrix.mode == 'interface'
        run: python maintain/sync_wxwidgets.py --source /tmp/wxWidgets --dest . --interface-only

      - name: Install build dependencies
        if: steps.check.outputs.skip != 'true' && matrix.mode == 'full'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgl1-mesa-dev

      - name: Configure wxWidgets
        if: steps.check.outputs.skip != 'true' && matrix.mode == 'full'
        run: |
          cmake -B /tmp/wxbuild -S . -G Ninja \
            -DwxBUILD_SHARED=OFF \
            -DwxBUILD_SAMPLES=OFF \
            -DwxBUILD_TESTS=OFF \
            -DwxBUILD_DEMOS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build wxWidgets core
        if: steps.check.outputs.skip != 'true' && matrix.mode == 'full'
        run: ninja -C /tmp/wxbuild wxbase wxcore

      - name: Get current date
        if: steps.check.outputs.skip != 'true'
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create source archive
        if: steps.check.outputs.skip != 'true' && matrix.mode == 'full'
        run: |
          tar -cJf /tmp/kwxFetch-source.tar.xz \
            CMakeLists.txt setup.h.in version-script.in \
            wx-config-inplace.in wx-config.in \
            3rdparty/ art/ build/ include/ src/ utils/

      - name: Create interface archive
        if: steps.check.outputs.skip != 'true' && matrix.mode == 'interface'
        run: |
          tar -cJf /tmp/kwxFetch-source.tar.xz interface/

      - name: Publish release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="wxWidgets ${{ steps.upstream.outputs.version }} (${{ matrix.name }}) — ${{ steps.date.outputs.today }}"
          NOTES=$(printf 'version=${{ steps.upstream.outputs.version }}\nSynced from wxWidgets ${{ matrix.wx_branch }} on ${{ steps.date.outputs.today }}.')
          TAG="${{ matrix.release_tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" --prerelease
            gh release upload "$TAG" /tmp/kwxFetch-source.tar.xz --clobber
          else
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES" --prerelease /tmp/kwxFetch-source.tar.xz
          fi
